<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Talent Circle</title>

  <!-- Theme Synchronization (runs before paint to avoid flash) -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./src/nav-common.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            purple: {
              950: '#0f0a1a',
              900: '#1a0f2e',
              800: '#3a0050',
              700: '#5a0072',
              600: '#7a0094',
              500: '#9600B6',
              400: '#b300ff',
            }
          },
          animation: {
            float: 'float 3s ease-in-out infinite',
            glow: 'glow 2s ease-in-out infinite alternate',
            'slide-up': 'slideUp 0.8s ease-out'
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            glow: {
              '0%': { boxShadow: '0 0 20px #9600B6' },
              '100%': { boxShadow: '0 0 40px #b300ff, 0 0 60px #9600B6' },
            },
            slideUp: {
              '0%': { opacity: 0, transform: 'translateY(30px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Poppins', sans-serif; }

  .input-focus {
    box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.5);
  }

  .label-float {
    transition: all 0.3s ease;
  }

  .input-valid + .label-float,
  .peer-valid + .label-float {
    transform: translateY(-0.75rem);
    font-size: 0.75rem;
    color: #c084fc;
  }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(150, 0, 182, 0.15);
      transition: background 0.4s, border-color 0.4s;
    }
    .dark .glass {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="text-slate-900 bg-slate-50 dark:text-white dark:bg-black transition-colors duration-300">
  <!-- Background -->
  <div class="fixed inset-0 bg-gradient-to-br from-purple-100 via-slate-50 to-purple-200 dark:from-purple-950 dark:via-black dark:to-purple-900 opacity-75"></div>

  <!-- NAVBAR placeholder injected by nav-common.js -->
  <div id="navbar-placeholder"></div>

  <!-- THEME TOGGLE -->
  <button
    id="theme-toggle"
    aria-label="Toggle dark and light theme"
    class="fixed top-5 right-5 z-50 w-12 h-12 rounded-full glass border border-purple-500/30 flex items-center justify-center text-xl hover:scale-110 active:scale-95 transition-all duration-300"
  >
    <span id="theme-toggle-icon">🌙</span>
  </button>

  <!-- MOBILE MENU -->
  <div
    id="mobileMenu"
    class="hidden fixed top-0 left-0 w-full h-full bg-white/95 dark:bg-black/95 backdrop-blur-md z-40 md:hidden p-6 text-center"
  >
    <button onclick="toggleMenu()" class="absolute top-6 right-6 text-3xl">✕</button>
    <a href="home.html" class="block py-8 text-2xl hover:text-purple-400">Home</a>
    <a href="about.html" class="block py-8 text-2xl hover:text-purple-400">About</a>
    <a href="signin.html" class="block py-8 text-2xl bg-purple-600 mx-auto px-12 rounded-full hover:bg-purple-700">Sign In</a>
  </div>

  <!-- MAIN CONTENT -->
  <main class="relative z-10 min-h-screen flex items-center justify-center px-6 py-24 md:py-32">
    <div class="max-w-md w-full glass rounded-3xl p-10 md:p-12 shadow-2xl animate-slide-up backdrop-blur-xl border border-purple-500/30">
      <div class="text-center mb-6">
        <img
          src="images/logo.png"
          class="mx-auto w-24 md:w-32 lg:w-40 animate-float mb-6 z-20 drop-shadow-2xl"
          alt="Talent Circle Logo"
        />
        <h1
          class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-purple-600 to-purple-400 dark:from-purple-400 dark:to-purple-200 bg-clip-text text-transparent mb-4"
        >
          Forgot Password?
        </h1>
        <p class="text-slate-600 dark:text-gray-300 text-lg">Enter your email to receive a reset link</p>
      </div>

      <form id="forgotForm" class="space-y-6">
        <div class="relative">
          <input
            type="email"
            id="email"
            required
            class="peer w-full px-4 py-4 bg-white/50 dark:bg-black/50 border border-purple-500/20 dark:border-white/20 rounded-xl text-slate-900 dark:text-white placeholder-transparent focus:outline-none focus:glass input-focus transition-all duration-300"
            placeholder=" "
          />
          <label
            for="email"
            class="absolute left-4 top-4 text-slate-500 dark:text-gray-400 label-float peer-placeholder-shown:text-lg peer-focus:-translate-y-3 peer-focus:text-xs peer-focus:text-purple-400 peer-valid:-translate-y-3 peer-valid:text-xs peer-valid:text-purple-400"
          >
            Email Address
          </label>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-gradient-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 text-white text-lg font-semibold py-4 px-8 rounded-2xl transition-all duration-300 transform hover:scale-105 hover:shadow-2xl hover:shadow-purple-500/50 animate-pulse"
        >
          Send Reset Link
        </button>
      </form>

      <div
        id="successMessage"
        class="hidden mt-6 p-4 bg-emerald-500/20 border border-emerald-500/50 rounded-2xl text-emerald-600 dark:text-emerald-300 text-center"
      >
        <p class="font-semibold mb-2">Check your email!</p>
        <p class="text-sm">We've sent a password reset link to your inbox.</p>
      </div>

      <p class="text-center mt-8 text-slate-500 dark:text-gray-400 text-sm">
        Remember your password?
        <a href="signin.html" class="font-semibold text-purple-500 dark:text-purple-400 hover:text-purple-400 dark:hover:text-purple-300 transition">Sign in here</a>
      </p>
    </div>
  </main>

  <script>
    // Mobile menu toggle (matching signin)
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const themeToggleIcon = document.getElementById('theme-toggle-icon');

    function updateThemeIcon() {
      themeToggleIcon.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';
    }
    updateThemeIcon();

    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      updateThemeIcon();
    });

    // Form handling
    const form = document.getElementById('forgotForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMessage');
    const emailInput = document.getElementById('email');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!form.checkValidity()) return;

      const email = emailInput.value;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const res = await fetch('http://localhost:8000/index.php/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
          form.classList.add('hidden');
          successMsg.classList.remove('hidden');
        } else {
          alert(data.error || 'Failed to send reset link');
        }
      } catch (err) {
        alert('Server error. Ensure backend is running at localhost:8000');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });

    // Floating labels and focus effects (matching existing)
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        input.classList.add('input-valid');
        const label = input.parentNode.querySelector('label');
        if (label) label.classList.add('animate-pulse');
      });
      input.addEventListener('blur', () => {
        if (!input.value) input.classList.remove('input-valid');
      });
    });

    // Init nav on load
    window.addEventListener('load', () => {
      if (window.talentNav && window.talentNav.initTalentNav) {
        window.talentNav.initTalentNav();
      }
    });
  </script>
</body>
</html>
